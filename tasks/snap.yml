---
- name: Remove snap
  become: true
  block:
    # Purging snapd also removes ubuntu-server-minimal, which hard-depends on it, so the
    # two cannot coexist. That metapackage is a leaf (ubuntu-server does not depend on
    # it) and nothing it pulls in is orphaned by its removal, because ubuntu-server,
    # ubuntu-standard, and the Recommends of docker-ce/man-db/rsyslog hold those
    # packages in place. The only cost is that a release upgrade will no longer add
    # newly-introduced server defaults on its own.
    #
    # autoremove and clean are deliberately omitted: disk-cleanup already runs
    # `apt-get autoremove --purge` weekly, and sweeping orphans from here would remove
    # unrelated packages as a side effect of removing snap.
    - name: Purge snap packages
      ansible.builtin.apt:
        name: "{{ base_snap_packages }}"
        purge: true
        state: absent

    # dpkg discards a hold for a package it has no record of (state "un"), which is the
    # case for the ones it never knew, so a hold could not keep them uninstalled. A
    # negative pin does, regardless of dpkg state. apt_preferences(5) takes several
    # names on one Package: line, so this is one record rather than one per package.
    #
    # A negative pin is stronger than a hold in two ways worth knowing: apt will not
    # install these even to satisfy another package's dependency, and `apt dist-upgrade`
    # removes any of them that is somehow installed rather than leaving it alone.
    - name: Pin snap packages
      ansible.builtin.copy:
        content: |
          Package: {{ base_snap_packages | join(' ') }}
          Pin: release a=*
          Pin-Priority: -1
        dest: /etc/apt/preferences.d/no-snap
        mode: "0644"

    - name: Find user snap directories
      ansible.builtin.find:
        paths: /home
        patterns: snap
        depth: 2
        file_type: directory
        recurse: true
      register: base_snap_directories_result

    - name: Remove the discovered snap directories
      ansible.builtin.file:
        path: "{{ item.path | default(item) }}"
        state: absent
      loop: "{{ base_snap_directories_result.files + ['/root/snap', '/var/cache/snapd'] }}"

    # snapd enables its user services by symlinking them into the per-user
    # ~/.config/systemd/user/*.wants directories. Purging snapd deletes the units but
    # leaves those symlinks behind, dangling. They are not harmless: a .wants entry is
    # resolved by unit name rather than through the link, so the dependency outlives the
    # unit and systemd reports it as not-found at every login.
    - name: Find user systemd unit directories
      ansible.builtin.find:
        paths: /home
        depth: 1
        file_type: directory
      register: base_home_directories_result

    # Both patterns are needed: `snap.*` matches the per-snap units (snap.foo.bar.service),
    # while snapd's own user units are snapd.session-agent.service and .socket, which the
    # first glob does not match because it requires a literal dot after "snap".
    - name: Find leftover snap enable symlinks
      ansible.builtin.find:
        paths: "{{ (base_home_directories_result.files | map(attribute='path') | list + ['/root'])
          | product(['/.config/systemd/user']) | map('join') | list }}"
        patterns:
          - snap.*
          - snapd.*
        file_type: link
        recurse: true
      register: base_snap_links_result

    - name: Remove the discovered snap enable symlinks
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: absent
      loop: "{{ base_snap_links_result.files }}"
      loop_control:
        label: "{{ item.path }}"
