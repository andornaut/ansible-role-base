---
- name: Install system packages
  ansible.builtin.apt:
    name:
      - acpi
      # Installs `setfacl` for:
      # https://github.com/georchestra/ansible/issues/55#issuecomment-588313638
      - acl
      - atool
      - atop
      - autoconf
      - autoconf-archive
      - autotools-dev
      - bash
      - build-essential
      - ca-certificates
      - cifs-utils
      - cmake
      - coreutils
      - curl
      - dnsutils
      - elinks
      - exfat-fuse
      - exuberant-ctags
      - fakeroot
      - fonts-font-awesome
      - fonts-inconsolata
      - fonts-roboto
      - gcc
      - git
      - highlight
      - htop
      - i2c-tools
      - iftop
      - iotop
      - iperf
      - irssi
      - libc6
      - libfontconfig
      - libfreetype6
      - libfreetype6-dev
      - libfuse2
      - linux-firmware
      - lm-sensors
      - make
      - mercurial
      - mutt
      - nethogs
      - net-tools
      - nmap
      - ntpdate
      - openconnect
      - openvpn
      - perl
      - powertop
      - ranger
      - rsync
      - screen
      - smartmontools
      - smbclient
      - software-properties-common
      - sox
      - ssh
      - sysstat
      - tmux
      - tree
      - unrar
      - unzip
      - update-manager-core
      - vim
      - wget
      - whois
      - zip
    state: present
    update_cache: true
  become: true

- name: Install exfat packages
  ansible.builtin.apt:
    name:
      - exfatprogs
    install_recommends: false
    state: present
  become: true

- name: Enable multiverse and universe repositories
  ansible.builtin.command: add-apt-repository -y {{ item }}
  with_items:
    - multiverse
    - universe
  changed_when: true
  become: true

# https://askubuntu.com/a/1254303
- name: Disable ssh motd news/advertisement
  ansible.builtin.lineinfile:
    create: true
    line: 'ENABLED=0'
    path: /etc/default/motd-news
    regexp: '^ENABLED\s*='
    mode: "0644"
  become: true

- name: Set timezone
  community.general.timezone:
    name: "{{ base_timezone }}"
  become: true

- name: Re-map capslock key to escape key
  ansible.builtin.lineinfile:
    line: 'XKBOPTIONS="caps:escape"'
    path: /etc/default/keyboard
    regexp: '^XKBOPTIONS\s*='
  become: true
  notify: Apply keyboard changes

- name: Install cache-command
  ansible.builtin.get_url:
    url: https://raw.githubusercontent.com/andornaut/cache-command/master/cache-command
    dest: /usr/local/bin/
    mode: "0755"
  become: true

- name: Make Vim the default editor
  community.general.alternatives:
    name: editor
    path: /etc/alternatives/vim
  become: true

- name: Import gog tasks
  ansible.builtin.import_tasks: gog.yml

- name: Import mrs tasks
  ansible.builtin.import_tasks: mrs.yml

- name: Import storage-space-alert tasks
  ansible.builtin.import_tasks: storage-space-alert.yml

- name: Import systemd tasks
  ansible.builtin.import_tasks: systemd.yml
